<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Whisper-WA | تسجيل الدخول</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>

:root{
--primary-dark:#1f5f3b;
--primary-mid:#3f9b5f;
--primary-light:#5fbf7a;
--accent-glow:#8fd9a8;
--bg-dark:#0e1a12;
--glass-bg: rgba(20,40,30,0.65);
--glass-border: rgba(95,191,122,0.3);
--text-muted:#c2dec9;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Tajawal',sans-serif;
background:var(--bg-dark);
color:white;
min-height:100vh;
padding:20px;
}

.main-container{
display:flex;
align-items:center;
justify-content:center;
min-height:90vh;
}

.card{
width:min(820px,95vw);
background:var(--glass-bg);
border:1px solid var(--glass-border);
border-radius:22px;
padding:26px;
backdrop-filter:blur(14px);
}

.tabs{
display:flex;
background:rgba(0,0,0,0.18);
border-radius:16px;
overflow:hidden;
margin-bottom:14px;
}

.tab-btn{
flex:1;
padding:12px;
border:none;
background:none;
color:var(--text-muted);
font-weight:900;
cursor:pointer;
font-family:inherit;
}

.tab-btn.active{
background:rgba(95,191,122,0.16);
color:var(--accent-glow);
}

.tab-content{display:none;}
.tab-content.active{display:block;}

label{
display:block;
margin:10px 0 6px;
color:var(--text-muted);
font-weight:800;
}

input,select,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid var(--glass-border);
background:rgba(0,0,0,0.25);
color:white;
font-family:inherit;
}

textarea{
min-height:110px;
resize:vertical;
}

.actions{
display:flex;
gap:12px;
margin-top:14px;
}

.btn{
flex:1;
padding:12px;
border-radius:14px;
font-weight:900;
cursor:pointer;
border:none;
font-family:inherit;
}

.btn-primary{
background:linear-gradient(45deg,var(--primary-dark),var(--primary-mid));
color:white;
}

.btn-ghost{
background:rgba(0,0,0,0.2);
color:var(--accent-glow);
border:1px solid rgba(255,255,255,0.1);
}

.alert{
margin-top:16px;
padding:12px;
border-radius:14px;
font-weight:900;
}

.success{
background:rgba(95,191,122,0.14);
border:1px solid rgba(95,191,122,0.3);
}

.danger{
background:rgba(255,107,107,0.14);
border:1px solid rgba(255,107,107,0.3);
}

.hidden{display:none;}

/* ✅ صندوق الرسالة مثل الصورة */
.info-box{
margin-top:14px;
padding:14px;
border-radius:12px;
background:rgba(95,191,122,0.08);
border:1px solid rgba(95,191,122,0.25);
color:#cfe8d7;
font-size:14px;
line-height:1.7;
}

</style>
</head>

<body>

<div class="main-container">

<section class="card">

<h1>التحكم بالوصول</h1>
<p>سجّل دخول أو اطلب حساب</p>

<div class="tabs">
<button class="tab-btn active" data-tab="login">تسجيل الدخول</button>
<button class="tab-btn" data-tab="request">طلب حساب</button>
</div>

<!-- LOGIN -->
<div class="tab-content active" id="login">

<label>البريد الإلكتروني</label>
<input id="loginUser">

<label>كلمة المرور</label>
<input id="loginPass" type="password">

<div class="actions">
<button class="btn btn-primary" id="btnLogin">تسجيل الدخول</button>
</div>

</div>

<!-- REQUEST -->
<div class="tab-content" id="request">

<label>الاسم الكامل *</label>
<input id="reqName">

<label>البريد الإلكتروني *</label>
<input id="reqEmail">

<label>كلمة المرور *</label>
<input id="reqCode">

<label>القسم</label>
<select id="reqDept">
<option>-- اختر --</option>
<option>الأدلة الجنائية الرقمية</option>
<option>التحقيقات</option>
<option>الأمن السيبراني</option>
<option>القانوني والامتثال</option>
<option>أخرى</option>
</select>

<label>سبب طلب الوصول *</label>
<textarea id="reqReason"></textarea>

<!-- ✅ الرسالة المطلوبة مثل الصورة -->
<div class="info-box">
سيتم مراجعة طلبك من قبل مسؤول النظام. ستصلك رسالة عبر البريد الإلكتروني بعد اعتماد الحساب أو في حال الحاجة لمعلومات إضافية.
</div>

<div class="actions">
<button class="btn btn-primary" id="btnSubmitRequest">إرسال الطلب</button>
<button class="btn btn-ghost" id="btnClearRequest">مسح النموذج</button>
</div>

</div>

<div id="alertBox" class="alert hidden"></div>

</section>
</div>

<script>

/* tabs */
document.querySelectorAll(".tab-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
btn.classList.add("active");
document.getElementById(btn.dataset.tab).classList.add("active");
};
});

/* alert */
function showAlert(type,msg){
const box=document.getElementById("alertBox");
box.className="alert "+type;
box.textContent=msg;
box.classList.remove("hidden");
}

/* login */
btnLogin.onclick=()=>{
const user=loginUser.value.trim();
const pass=loginPass.value.trim();

if(!user||!pass){
showAlert("danger","الرجاء إدخال البريد وكلمة المرور");
return;
}

if(user==="admin" && pass==="admin123"){
showAlert("success","تم تسجيل الدخول");
setTimeout(()=>location.href="connect.html",1000);
}else{
showAlert("danger","بيانات غير صحيحة");
}
};

/* request */
btnSubmitRequest.onclick=()=>{

const name=reqName.value.trim();
const email=reqEmail.value.trim();
const code=reqCode.value.trim();
const dept=reqDept.value;
const reason=reqReason.value.trim();

if(!name||!email||!code||!reason){
showAlert("danger","الرجاء تعبئة الحقول المطلوبة");
return;
}

const requests=JSON.parse(localStorage.getItem("accountRequests")||"[]");

requests.push({
id:Date.now(),
name,
email,
code,
department:dept,
reason,
status:"pending"
});

localStorage.setItem("accountRequests",JSON.stringify(requests));

showAlert("success","تم إرسال الطلب بنجاح");

setTimeout(()=>{
location.href="pending.html";
},3000);

};

btnClearRequest.onclick=()=>{
["reqName","reqEmail","reqCode","reqDept","reqReason"]
.forEach(id=>document.getElementById(id).value="");
};

</script>

</body>
</html>
