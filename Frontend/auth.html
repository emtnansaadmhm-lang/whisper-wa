<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title id="page-window-title">Whisper-WA | تسجيل الدخول</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>

:root{
--primary-dark:#1f5f3b;
--primary-mid:#3f9b5f;
--primary-light:#5fbf7a;
--accent-glow:#8fd9a8;
--bg-dark:#0e1a12;
--glass-bg: rgba(20,40,30,0.65);
--glass-border: rgba(95,191,122,0.3);
--text-white:#ffffff;
--text-muted:#c2dec9;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Tajawal',sans-serif;
background-color:var(--bg-dark);
color:white;
min-height:100vh;
padding:20px;
background-image:
radial-gradient(1200px 700px at 20% 10%, rgba(95,191,122,0.12), transparent 55%),
radial-gradient(900px 600px at 85% 20%, rgba(143,217,168,0.10), transparent 55%),
linear-gradient(rgba(31,95,59,0.10) 1px, transparent 1px),
linear-gradient(90deg, rgba(31,95,59,0.10) 1px, transparent 1px);
background-size:auto,auto,40px 40px,40px 40px;
}

.animated-bg-logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:-1;
width:620px;
opacity:0.18;
animation:glow 8s ease-in-out infinite alternate;
}

.animated-bg-logo img{
width:100%;
filter:drop-shadow(0 0 30px var(--primary-mid));
}

@keyframes glow{
from{opacity:0.1;transform:translate(-50%,-50%) scale(0.96);}
to{opacity:0.26;transform:translate(-50%,-50%) scale(1.04);}
}

.ww-topbar{
background:var(--glass-bg);
border:1px solid var(--glass-border);
backdrop-filter:blur(12px);
border-radius:16px;
padding:12px 18px;
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.ww-left{display:flex;align-items:center;gap:12px;}

.ww-icon-btn{
border:none;
background:rgba(0,0,0,0.18);
color:#c2dec9;
width:38px;
height:38px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
text-decoration:none;
}

.ww-brand{display:flex;align-items:center;gap:12px;}

.ww-logo{height:42px;}

.ww-title b{font-size:1.15rem;}

.ww-title span{
color:#c2dec9;
font-size:0.85rem;
display:block;
}

.ww-lang-btn{
background:rgba(95,191,122,0.10);
border:1px solid rgba(95,191,122,0.3);
color:#8fd9a8;
padding:8px 14px;
border-radius:999px;
cursor:pointer;
font-weight:900;
display:flex;
align-items:center;
gap:6px;
font-family:inherit;
}

.main-container{
display:flex;
align-items:center;
justify-content:center;
min-height:80vh;
}

.card{
width:min(820px,95vw);
background:var(--glass-bg);
border:1px solid var(--glass-border);
backdrop-filter:blur(14px);
border-radius:22px;
padding:26px;
}

.tabs{
display:flex;
background:rgba(0,0,0,0.18);
border-radius:16px;
overflow:hidden;
margin-bottom:14px;
}

.tab-btn{
flex:1;
padding:12px;
border:none;
background:none;
color:var(--text-muted);
font-weight:900;
cursor:pointer;
font-family:inherit;
}

.tab-btn.active{
background:rgba(95,191,122,0.16);
color:var(--accent-glow);
}

.tab-content{display:none;}
.tab-content.active{display:block;}

label{
display:block;
margin:10px 0 6px;
color:var(--text-muted);
font-weight:800;
}

.required{color:#ff6b6b;}

input,select,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid var(--glass-border);
background:rgba(0,0,0,0.25);
color:white;
font-family:inherit;
}

textarea{min-height:110px;}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.actions{display:flex;gap:12px;margin-top:14px;}

.btn{
flex:1;
padding:12px;
border-radius:14px;
font-weight:900;
cursor:pointer;
border:none;
font-family:inherit;
}

.btn-primary{
background:linear-gradient(45deg,var(--primary-dark),var(--primary-mid));
color:white;
}

.btn-ghost{
background:rgba(0,0,0,0.2);
color:var(--accent-glow);
border:1px solid rgba(255,255,255,0.1);
}

.alert{
margin-top:16px;
padding:12px;
border-radius:14px;
font-weight:900;
}

.success{
background:rgba(95,191,122,0.14);
border:1px solid rgba(95,191,122,0.3);
}

.danger{
background:rgba(255,107,107,0.14);
border:1px solid rgba(255,107,107,0.3);
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="animated-bg-logo">
<img src="logo.png">
</div>

<header class="ww-topbar">
<div class="ww-left">

<a href="index.html" class="ww-icon-btn">
<i class="fa-solid fa-arrow-left" id="back-icon"></i>
</a>

<div class="ww-brand">
<img src="logo.png" class="ww-logo">
<div class="ww-title">
<b>Whisper-WA</b>
<span id="top-subtitle">منصة التحليل الجنائي الرقمي</span>
</div>
</div>

</div>

<button class="ww-lang-btn" id="btnLang">
<i class="fa-solid fa-globe"></i>
<span id="langText">English</span>
</button>

</header>

<div class="main-container">

<section class="card">

<h1 id="page-title">التحكم بالوصول</h1>
<p id="page-subtitle">سجّل دخول أو اطلب حساب</p>

<div class="tabs">
<button class="tab-btn active" data-tab="login">تسجيل الدخول</button>
<button class="tab-btn" data-tab="request">طلب حساب</button>
</div>

<div class="tab-content active" id="login">

<label>البريد الإلكتروني</label>
<input id="loginUser">

<label>كلمة المرور</label>
<input id="loginPass" type="password">

<div class="actions">
<button class="btn btn-primary" id="btnLogin">تسجيل الدخول</button>
</div>

</div>

<div class="tab-content" id="request">

<label>الاسم الكامل *</label>
<input id="reqName">

<label>البريد الإلكتروني *</label>
<input id="reqEmail">

<label>كلمة المرور *</label>
<input id="reqCode">

<label>القسم</label>
<select id="reqDept">
<option>-- اختر --</option>
<option>الأدلة الجنائية الرقمية</option>
<option>التحقيقات</option>
<option>الأمن السيبراني</option>
<option>القانوني والامتثال</option>
<option>أخرى</option>
</select>

<label>سبب طلب الوصول *</label>
<textarea id="reqReason"></textarea>

<div class="actions">
<button class="btn btn-primary" id="btnSubmitRequest">إرسال الطلب</button>
<button class="btn btn-ghost" id="btnClearRequest">مسح النموذج</button>
</div>

</div>

<div id="alertBox" class="alert hidden"></div>

</section>
</div>

<script>

function showAlert(type,msg){
const box=document.getElementById("alertBox");
box.className="alert "+type;
box.textContent=msg;
box.classList.remove("hidden");
}

document.querySelectorAll(".tab-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
btn.classList.add("active");
document.getElementById(btn.dataset.tab).classList.add("active");
};
});

document.getElementById("btnLogin").onclick=()=>{
const user=loginUser.value.trim();
const pass=loginPass.value.trim();

if(!user||!pass){
showAlert("danger","الرجاء إدخال البريد وكلمة المرور");
return;
}

if(user==="admin" && pass==="admin123"){
showAlert("success","تم تسجيل الدخول");
setTimeout(()=>location.href="connect.html",1000);
}else{
showAlert("danger","بيانات غير صحيحة");
}
};

document.getElementById("btnSubmitRequest").onclick=()=>{

const name=reqName.value.trim();
const email=reqEmail.value.trim();
const code=reqCode.value.trim();
const dept=reqDept.value;
const reason=reqReason.value.trim();

if(!name||!email||!code||!reason){
showAlert("danger","الرجاء تعبئة الحقول المطلوبة");
return;
}

const requests=JSON.parse(localStorage.getItem("accountRequests")||"[]");

requests.push({
id:Date.now(),
name,
email,
code,
department:dept,
reason,
status:"pending"
});

localStorage.setItem("accountRequests",JSON.stringify(requests));

/* ✅ الرسالة المطلوبة بدون تغيير الصفحة */
showAlert(
"success",
"تم إرسال طلبك بنجاح. سيتم توجيه الطلب إلى البريد الإلكتروني لمسؤول النظام للمراجعة والاعتماد، وسيتم إشعارك بالنتيجة قريباً."
);

setTimeout(()=>location.href="pending.html",4000);
};

document.getElementById("btnClearRequest").onclick=()=>{
["reqName","reqEmail","reqCode","reqDept","reqReason"]
.forEach(id=>document.getElementById(id).value="");
};

</script>

</body>
</html>
