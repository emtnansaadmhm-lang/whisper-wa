<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Control</title>

<style>

body{
font-family:Arial;
background:#0e1a12;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#14281e;
padding:30px;
border-radius:15px;
width:600px;
}

h1{
margin-bottom:10px;
}

.subtitle{
color:#ccc;
margin-bottom:20px;
}

.tabs{
display:flex;
margin-bottom:20px;
}

.tab-btn{
flex:1;
padding:10px;
border:none;
cursor:pointer;
background:#1f3d2c;
color:#ccc;
}

.tab-btn.active{
background:#3f9b5f;
color:white;
}

.tab-content{
display:none;
}

.tab-content.active{
display:block;
}

label{
display:block;
margin-top:10px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
}

textarea{
height:100px;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btn-primary{
background:#3f9b5f;
color:white;
}

.btn-ghost{
background:#333;
color:white;
}

.note{
margin-top:10px;
font-size:14px;
color:#bbb;
}

</style>
</head>

<body>

<div class="card">

<h1>التحكم بالوصول</h1>
<p class="subtitle">سجل الدخول أو أرسل طلب حساب</p>

<div class="tabs">
<button class="tab-btn active" data-tab="login">تسجيل الدخول</button>
<button class="tab-btn" data-tab="request">طلب حساب</button>
</div>

<!-- LOGIN -->
<div class="tab-content active" id="login">

<label>البريد الإلكتروني</label>
<input id="loginEmail">

<label>كلمة المرور</label>
<input type="password" id="loginPassword">

<div class="actions">
<button class="btn-primary" id="loginBtn">تسجيل الدخول</button>
</div>

</div>

<!-- REQUEST -->
<div class="tab-content" id="request">

<label>الاسم الكامل *</label>
<input id="name">

<label>البريد الإلكتروني *</label>
<input id="email">

<label>رمز الوصول *</label>
<input id="accessCode">

<label>القسم</label>
<select id="department">
<option>Cyber Security</option>
<option>Investigation</option>
<option>Digital Forensics</option>
<option>Compliance</option>
</select>

<label>سبب طلب الوصول *</label>
<textarea id="reason"></textarea>

<div class="note">
سيتم إرسال طلبك إلى Administrator وسيتم مراجعة الطلب والموافقة عليه أو رفضه.
</div>

<div class="actions">
<button class="btn-primary" id="submitRequest">إرسال الطلب</button>
<button class="btn-ghost" id="clearForm">مسح</button>
</div>

</div>

</div>

<script>

document.querySelectorAll(".tab-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"))
document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"))
btn.classList.add("active")
document.getElementById(btn.dataset.tab).classList.add("active")
}
})

document.getElementById("loginBtn").onclick=()=>{
alert("تم تسجيل الدخول")
}

document.getElementById("submitRequest").onclick=()=>{

const name=document.getElementById("name").value
const email=document.getElementById("email").value
const code=document.getElementById("accessCode").value
const reason=document.getElementById("reason").value

if(!name||!email||!code||!reason){
alert("الرجاء تعبئة الحقول المطلوبة")
return
}

let requests=JSON.parse(localStorage.getItem("requests")||"[]")

requests.push({
name:name,
email:email,
accessCode:code,
reason:reason
})

localStorage.setItem("requests",JSON.stringify(requests))

alert("تم إرسال الطلب")
}

document.getElementById("clearForm").onclick=()=>{
document.getElementById("name").value=""
document.getElementById("email").value=""
document.getElementById("accessCode").value=""
document.getElementById("reason").value=""
}

</script>

</body>
</html>
