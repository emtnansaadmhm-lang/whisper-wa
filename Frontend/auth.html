<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Whisper-WA | تسجيل الدخول</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
font-family:'Tajawal',sans-serif;
background:#0e1a12;
color:#fff;
padding:20px;
}

.card{
max-width:800px;
margin:auto;
background:rgba(20,40,30,.7);
padding:25px;
border-radius:20px;
border:1px solid rgba(95,191,122,.3);
}

h1{margin-bottom:10px}

.tabs{
display:flex;
background:#0003;
border-radius:12px;
overflow:hidden;
margin-bottom:15px;
}

.tab-btn{
flex:1;
padding:12px;
border:none;
background:none;
color:#c2dec9;
font-weight:900;
cursor:pointer;
}

.tab-btn.active{
background:#5fbf7a22;
color:#8fd9a8;
}

.tab-content{display:none}
.tab-content.active{display:block}

label{display:block;margin-top:10px}

input,textarea,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:1px solid #3f9b5f55;
background:#0004;
color:#fff;
}

textarea{min-height:100px}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:12px;
font-weight:900;
cursor:pointer;
}

.btn-primary{
background:linear-gradient(45deg,#1f5f3b,#3f9b5f);
color:#fff;
}

.btn-ghost{
background:#0004;
color:#8fd9a8;
}

.alert{
margin-top:15px;
padding:12px;
border-radius:12px;
font-weight:bold;
}

.success{background:#1f5f3b55}
.danger{background:#aa333355}

.hidden{display:none}

/* ⭐ رسالة إشعار الأدمن الجديدة */
.admin-note{
margin-top:12px;
padding:12px;
border-radius:12px;
background:rgba(99,179,237,0.08);
border:1px solid rgba(99,179,237,0.3);
line-height:1.7;
color:#d6ecff;
font-size:0.95rem;
}

</style>
</head>

<body>

<div class="card">

<h1>التحكم بالوصول</h1>

<div class="tabs">
<button class="tab-btn active" data-tab="login">تسجيل الدخول</button>
<button class="tab-btn" data-tab="request">طلب حساب</button>
</div>

<!-- LOGIN -->
<div class="tab-content active" id="login">

<label>البريد الإلكتروني</label>
<input id="loginUser">

<label>كلمة المرور</label>
<input type="password" id="loginPass">

<div class="actions">
<button class="btn-primary" id="btnLogin">تسجيل الدخول</button>
</div>

</div>

<!-- REQUEST -->
<div class="tab-content" id="request">

<div class="row">
<div>
<label>الاسم الكامل *</label>
<input id="reqName">
</div>

<div>
<label>البريد الإلكتروني *</label>
<input id="reqEmail">
</div>
</div>

<div class="row">
<div>
<label>رمز الوصول *</label>
<input id="reqCode">
</div>

<div>
<label>القسم</label>
<select id="reqDept">
<option value="">-- اختر --</option>
<option>الأدلة الجنائية الرقمية</option>
<option>التحقيقات</option>
<option>الأمن السيبراني</option>
<option>القانوني والامتثال</option>
<option>أخرى</option>
</select>
</div>
</div>

<label>سبب طلب الوصول *</label>
<textarea id="reqReason"></textarea>

<!-- ⭐ الرسالة الجديدة -->
<div class="admin-note">
<i class="fa-solid fa-envelope"></i>
بعد إرسال الطلب سيتم إشعار مسؤول النظام (Administrator) عبر البريد الإلكتروني.
سيقوم المسؤول بمراجعة طلبك والموافقة أو الرفض، وستصلك نتيجة الطلب عبر الإيميل المسجل.
</div>

<div class="actions">
<button class="btn-primary" id="btnSubmitRequest">إرسال الطلب</button>
<button class="btn-ghost" id="btnClearRequest">مسح النموذج</button>
</div>

</div>

<div id="alertBox" class="alert hidden"></div>

</div>

<script>

/* tabs */
document.querySelectorAll(".tab-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
btn.classList.add("active");
document.getElementById(btn.dataset.tab).classList.add("active");
};
});

function showAlert(type,msg){
const box=document.getElementById("alertBox");
box.className="alert "+type;
box.textContent=msg;
box.classList.remove("hidden");
}

/* login */
document.getElementById("btnLogin").onclick=()=>{
const u=loginUser.value.trim();
const p=loginPass.value.trim();

if(u==="admin" && p==="admin123"){
showAlert("success","تم تسجيل الدخول");
setTimeout(()=>location.href="connect.html",1000);
}else{
showAlert("danger","بيانات غير صحيحة");
}
};

/* request */
document.getElementById("btnSubmitRequest").onclick=()=>{

const name=reqName.value.trim();
const email=reqEmail.value.trim();
const code=reqCode.value.trim();
const dept=reqDept.value;
const reason=reqReason.value.trim();

if(!name||!email||!code||!reason){
showAlert("danger","الرجاء تعبئة الحقول المطلوبة");
return;
}

const requests=JSON.parse(localStorage.getItem("accountRequests")||"[]");

requests.push({
id:Date.now(),
name,email,code,dept,reason,status:"pending"
});

localStorage.setItem("accountRequests",JSON.stringify(requests));

showAlert("success","تم إرسال الطلب بنجاح وسيتم مراجعته من قبل المسؤول");

setTimeout(()=>location.href="pending.html",1200);
};

/* clear */
btnClearRequest.onclick=()=>{
["reqName","reqEmail","reqCode","reqDept","reqReason"].forEach(id=>{
document.getElementById(id).value="";
});
};

</script>

</body>
</html>
