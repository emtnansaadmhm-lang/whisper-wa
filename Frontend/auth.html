<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title id="page-window-title">Whisper-WA | تسجيل الدخول</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>

:root{
--primary-dark:#1f5f3b;
--primary-mid:#3f9b5f;
--primary-light:#5fbf7a;
--accent-glow:#8fd9a8;
--bg-dark:#0e1a12;
--glass-bg: rgba(20,40,30,0.65);
--glass-border: rgba(95,191,122,0.3);
--text-white:#ffffff;
--text-muted:#c2dec9;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Tajawal',sans-serif;
background-color:var(--bg-dark);
color:white;
min-height:100vh;
padding:20px;
background-image:
radial-gradient(1200px 700px at 20% 10%, rgba(95,191,122,0.12), transparent 55%),
radial-gradient(900px 600px at 85% 20%, rgba(143,217,168,0.10), transparent 55%),
linear-gradient(rgba(31,95,59,0.10) 1px, transparent 1px),
linear-gradient(90deg, rgba(31,95,59,0.10) 1px, transparent 1px);
background-size:auto,auto,40px 40px,40px 40px;
transition: all 0.3s ease;
}

.animated-bg-logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:-1;
width:620px;
opacity:0.18;
animation:glow 8s ease-in-out infinite alternate;
}

.animated-bg-logo img{
width:100%;
filter:drop-shadow(0 0 30px var(--primary-mid));
}

@keyframes glow{
from{opacity:0.1;transform:translate(-50%,-50%) scale(0.96);}
to{opacity:0.26;transform:translate(-50%,-50%) scale(1.04);}
}

.ww-topbar{
background:var(--glass-bg);
border:1px solid var(--glass-border);
backdrop-filter:blur(12px);
border-radius:16px;
padding:12px 18px;
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.ww-left{
display:flex;
align-items:center;
gap:12px;
}

.ww-icon-btn{
border:none;
background:rgba(0,0,0,0.18);
color:#c2dec9;
width:38px;
height:38px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
text-decoration:none;
}

.ww-brand{
display:flex;
align-items:center;
gap:12px;
}

.ww-logo{
height:42px;
}

.ww-title b{
font-size:1.15rem;
}

.ww-title span{
color:#c2dec9;
font-size:0.85rem;
display: block;
}

.ww-lang-btn{
background:rgba(95,191,122,0.10);
border:1px solid rgba(95,191,122,0.3);
color:#8fd9a8;
padding:8px 14px;
border-radius:999px;
cursor:pointer;
font-weight:900;
display:flex;
align-items:center;
gap:6px;
font-family: inherit;
transition: 0.2s;
}

.ww-lang-btn:hover {
background:rgba(95,191,122,0.20);
}

.main-container{
display:flex;
align-items:center;
justify-content:center;
min-height:80vh;
}

.card{
width:min(820px,95vw);
background:var(--glass-bg);
border:1px solid var(--glass-border);
backdrop-filter:blur(14px);
border-radius:22px;
padding:26px;
}

.tabs{
display:flex;
background:rgba(0,0,0,0.18);
border-radius:16px;
overflow:hidden;
margin-bottom:14px;
}

.tab-btn{
flex:1;
padding:12px;
border:none;
background:none;
color:var(--text-muted);
font-weight:900;
cursor:pointer;
font-family: inherit;
font-size: 1rem;
}

.tab-btn.active{
background:rgba(95,191,122,0.16);
color:var(--accent-glow);
}

.tab-content{display:none;}
.tab-content.active{display:block;}

label{
display:block;
margin:10px 0 6px;
color:var(--text-muted);
font-weight:800;
}

.required{color:#ff6b6b;}

input,select,textarea{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid var(--glass-border);
background:rgba(0,0,0,0.25);
color:white;
font-family: inherit;
}

textarea{
min-height:110px;
resize:vertical;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.actions{
display:flex;
gap:12px;
margin-top:14px;
}

.btn{
flex:1;
padding:12px;
border-radius:14px;
font-weight:900;
cursor:pointer;
border:none;
font-family: inherit;
font-size: 1rem;
}

.btn-primary{
background:linear-gradient(45deg,var(--primary-dark),var(--primary-mid));
color:white;
}

.btn-ghost{
background:rgba(0,0,0,0.2);
color:var(--accent-glow);
border:1px solid rgba(255,255,255,0.1);
}

.alert{
margin-top:16px;
padding:12px;
border-radius:14px;
font-weight:900;
}

.success{
background:rgba(95,191,122,0.14);
border:1px solid rgba(95,191,122,0.3);
}

.danger{
background:rgba(255,107,107,0.14);
border:1px solid rgba(255,107,107,0.3);
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="animated-bg-logo">
<img src="logo.png" alt="Logo">
</div>

<header class="ww-topbar">

<div class="ww-left">

<a href="index.html" class="ww-icon-btn">
<i class="fa-solid fa-arrow-left" id="back-icon"></i>
</a>

<div class="ww-brand">
<img src="logo.png" class="ww-logo" alt="Logo">

<div class="ww-title">
<b>Whisper-WA</b>
<span id="top-subtitle">منصة التحليل الجنائي الرقمي</span>
</div>

</div>
</div>

<button class="ww-lang-btn" id="btnLang">
<i class="fa-solid fa-globe"></i>
<span id="langText">English</span>
</button>

</header>

<div class="main-container">

<section class="card">

<h1 id="page-title">التحكم بالوصول</h1>
<p id="page-subtitle">سجّل دخول أو اطلب حساب</p>

<div class="tabs">
<button class="tab-btn active" data-tab="login" id="tab-login-btn">تسجيل الدخول</button>
<button class="tab-btn" data-tab="request" id="tab-request-btn">طلب حساب</button>
</div>

<div class="tab-content active" id="login">

<label id="lbl-email">البريد الإلكتروني</label>
<input id="loginUser" placeholder="admin">

<label id="lbl-password">كلمة المرور</label>
<input id="loginPass" type="password" placeholder="••••••••">

<div class="actions">
<button class="btn btn-primary" id="btnLogin">تسجيل الدخول</button>
</div>

</div>

<div class="tab-content" id="request">

<div class="row">

<div>
<label id="lbl-name">الاسم الكامل
