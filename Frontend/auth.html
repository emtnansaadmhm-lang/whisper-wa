<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Whisper-WA | Access Control</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

/* ===== BACKGROUND ===== */
body{
height:100vh;
background:
radial-gradient(circle at 20% 30%, #0f3d25 0%, transparent 40%),
radial-gradient(circle at 80% 70%, #124d2e 0%, transparent 40%),
#06140c;
display:flex;
justify-content:center;
align-items:center;
color:#e6fff1;
}

/* ===== TOP BAR ===== */
.topbar{
position:absolute;
top:25px;
width:92%;
max-width:1100px;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 22px;
border-radius:18px;
background:rgba(20,50,30,.55);
border:1px solid rgba(120,255,170,.15);
backdrop-filter:blur(14px);
}

.brand{
display:flex;
align-items:center;
gap:12px;
font-weight:600;
}

.brand span{
font-size:13px;
color:#a7d7b7;
}

.lang{
width:40px;
height:40px;
border-radius:50%;
background:rgba(90,200,120,.2);
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
}

/* ===== CARD ===== */
.card{
width:520px;
padding:35px;
border-radius:22px;
background:rgba(12,32,20,.65);
border:1px solid rgba(120,255,170,.15);
backdrop-filter:blur(20px);
box-shadow:0 0 60px rgba(0,0,0,.6);
}

/* ===== TITLE ===== */
h1{
font-size:26px;
margin-bottom:6px;
}

.subtitle{
color:#9ec9ad;
margin-bottom:22px;
font-size:14px;
}

/* ===== TABS ===== */
.tabs{
display:flex;
background:#0c2417;
border-radius:12px;
overflow:hidden;
margin-bottom:22px;
}

.tab{
flex:1;
padding:12px;
text-align:center;
font-weight:600;
color:#9ec9ad;
}

.tab.active{
background:linear-gradient(90deg,#2f8f57,#46b873);
color:white;
}

/* ===== FORM ===== */
.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.full{
grid-column:span 2;
}

label{
font-size:13px;
color:#a7d7b7;
margin-bottom:6px;
display:block;
}

input,select,textarea{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid rgba(120,255,170,.15);
background:#081b11;
color:white;
outline:none;
}

textarea{
height:120px;
resize:none;
}

.note{
margin-top:14px;
padding:14px;
border-radius:12px;
background:#0e2a1b;
border:1px solid rgba(120,255,170,.15);
font-size:13px;
color:#b7e6c8;
}

/* ===== BUTTONS ===== */
.actions{
display:flex;
gap:14px;
margin-top:18px;
}

.btn{
flex:1;
padding:14px;
border-radius:12px;
border:none;
font-weight:600;
cursor:pointer;
}

.primary{
background:linear-gradient(90deg,#2f8f57,#46b873);
color:white;
}

.ghost{
background:#081b11;
color:#9ec9ad;
border:1px solid rgba(120,255,170,.2);
}

/* ===== LOGIN ONLY ===== */
.demo{
margin-top:18px;
padding:14px;
border-radius:12px;
background:#0e2a1b;
border:1px solid rgba(120,255,170,.15);
font-size:13px;
color:#b7e6c8;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
<div class="brand">
<strong>Whisper-WA</strong>
<span>Digital Forensics Platform</span>
</div>
<div class="lang">AR</div>
</div>

<!-- CARD -->
<div class="card">

<h1>Access Control</h1>
<p class="subtitle">Login to continue, or request an account for approval.</p>

<!-- TABS -->
<div class="tabs">
<div class="tab active">Login</div>
<div class="tab">Request Account</div>
</div>

<!-- LOGIN FORM -->
<div class="full">

<label>Email</label>
<input placeholder="Enter your email">

<label style="margin-top:14px;">Password</label>
<input type="password" placeholder="Enter your password">

<div class="actions">
<button class="btn primary">Sign In</button>
</div>

<div class="demo">
<strong>Demo Credentials:</strong><br>
Email: <b>admin</b> | Password: <b>admin123</b>
</div>

</div>

</div>

</body>
</html>
