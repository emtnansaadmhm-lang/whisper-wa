<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisper-WA | Admin Dashboard</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary-dark:#1f5f3b;
      --primary-mid:#3f9b5f;
      --primary-light:#5fbf7a;
      --accent-glow:#8fd9a8;
      --bg-dark:#0e1a12;
      --glass-bg: rgba(20, 40, 30, 0.65);
      --glass-border: rgba(95, 191, 122, 0.3);
      --text-white:#ffffff;
      --text-muted:#c2dec9;
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{
      font-family:'Tajawal',sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-white);
      min-height:100vh;
      overflow-x:hidden;
      background-image:
        linear-gradient(rgba(31, 95, 59, 0.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 95, 59, 0.10) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .animated-bg-logo{
      position: fixed; top:50%; left:50%;
      transform: translate(-50%,-50%);
      z-index:-1; width: 650px;
      pointer-events:none; opacity:0.15;
      animation: cyberGlowPulse 8s ease-in-out infinite alternate;
    }
    .animated-bg-logo img{
      width:100%; height:auto;
      filter: drop-shadow(0 0 30px var(--primary-mid));
    }
    @keyframes cyberGlowPulse{
      0%{ opacity:0.10; transform: translate(-50%,-50%) scale(0.95); }
      100%{ opacity:0.25; transform: translate(-50%,-50%) scale(1.05); }
    }
    .main-container{
      max-width: 1400px; margin: 0 auto; padding: 24px;
      display:flex; flex-direction:column; gap: 20px;
    }
    .page-header{
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px);
      border-radius: 18px; padding: 20px 24px;
      display: flex; justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .header-left h1{ font-size: 1.8rem; margin-bottom: 4px; color: var(--primary-light); }
    .header-left p{ color: var(--text-muted); font-size: 0.95rem; }
    .stats-grid{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }
    .stat-card{
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px);
      border-radius: 18px; padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .stat-card .icon{
      width: 48px; height: 48px; border-radius: 12px;
      background: rgba(95,191,122,0.15);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent-glow); font-size: 1.4rem; margin-bottom: 12px;
    }
    .stat-card .value{ font-size: 2rem; font-weight: 900; margin-bottom: 4px; }
    .stat-card .label{ color: var(--text-muted); font-size: 0.9rem; }
    .panel{
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px);
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      padding: 20px; overflow: hidden;
    }
    .panel-header{
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .panel-header h3{
      font-size: 1.3rem; color: var(--primary-light);
      display: flex; align-items: center; gap: 10px;
    }
    .badge{
      display: inline-flex; align-items: center;
      justify-content: center; min-width: 24px;
      height: 24px; padding: 0 8px;
      border-radius: 999px; font-size: 0.8rem;
      font-weight: 900;
      background: rgba(255,193,7,0.2);
      color: #ffe7a6;
      border: 1px solid rgba(255,193,7,0.3);
    }
    .request-card{
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 16px;
      margin-bottom: 12px; transition: 0.25s;
    }
    .request-card:hover{
      background: rgba(95,191,122,0.08);
      border-color: rgba(95,191,122,0.2);
    }
    .request-header{
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 10px;
    }
    .request-info h4{
      font-size: 1.05rem; margin-bottom: 4px; color: white;
    }
    .request-info .email{
      color: var(--accent-glow); font-size: 0.9rem; margin-bottom: 4px;
    }
    .request-info .meta{ color: var(--text-muted); font-size: 0.85rem; }
    .request-reason{
      background: rgba(0,0,0,0.2);
      border-left: 3px solid var(--primary-mid);
      padding: 10px 12px; border-radius: 8px;
      margin: 10px 0; font-size: 0.9rem;
      line-height: 1.5; color: rgba(255,255,255,0.9);
    }
    .request-actions{ display: flex; gap: 8px; margin-top: 12px; }
    .btn-small{
      padding: 8px 16px; border-radius: 10px;
      border: none; cursor: pointer;
      font-weight: 800; font-family: inherit;
      font-size: 0.85rem; transition: 0.25s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-approve{
      background: rgba(95,191,122,0.2); color: #d8ffe4;
      border: 1px solid rgba(95,191,122,0.3);
    }
    .btn-approve:hover{
      background: rgba(95,191,122,0.35); transform: translateY(-1px);
    }
    .btn-reject{
      background: rgba(255,107,107,0.2); color: #ffd1d1;
      border: 1px solid rgba(255,107,107,0.3);
    }
    .btn-reject:hover{
      background: rgba(255,107,107,0.35); transform: translateY(-1px);
    }
    .user-table-wrap{
      overflow-x: auto; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.18);
    }
    .user-table{
      width: 100%; border-collapse: collapse; min-width: 600px;
    }
    .user-table thead th{
      background: rgba(20, 40, 30, 0.95);
      color: var(--primary-light);
      font-size: 0.9rem; text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .user-table tbody td{
      padding: 12px 16px; font-size: 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: var(--text-white);
    }
    .user-table tbody tr:hover{ background: rgba(95, 191, 122, 0.08); }
    .empty-state{
      padding: 40px; text-align: center;
      color: var(--text-muted); font-size: 0.95rem;
    }
    .empty-state i{
      font-size: 3rem; margin-bottom: 12px; opacity: 0.3;
    }
    .alert{
      padding: 12px 16px; border-radius: 12px;
      margin-bottom: 16px; font-weight: 800; display: none;
    }
    .alert.show{ display: block; }
    .alert.success{
      background: rgba(95,191,122,0.2); color: #d8ffe4;
      border: 1px solid rgba(95,191,122,0.3);
    }
    .alert.info{
      background: rgba(99,179,237,0.2); color: #d1e7ff;
      border: 1px solid rgba(99,179,237,0.3);
    }
    .alert.danger{
      background: rgba(255,107,107,0.2); color: #ffd1d1;
      border: 1px solid rgba(255,107,107,0.3);
    }
  </style>
</head>

<body>
  <div class="animated-bg-logo">
    <img src="logo.png" alt="Background Logo">
  </div>

  <div class="main-container">
    <div id="header-placeholder"></div>

    <header class="page-header">
      <div class="header-left">
        <h1><i class="fa-solid fa-shield-halved"></i> Admin Dashboard</h1>
        <p>Manage user access requests and active accounts</p>
      </div>
    </header>

    <div id="alertBox" class="alert"></div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="icon"><i class="fa-solid fa-clock"></i></div>
        <div class="value" id="statPending">0</div>
        <div class="label">Pending Requests</div>
      </div>
      <div class="stat-card">
        <div class="icon"><i class="fa-solid fa-user-check"></i></div>
        <div class="value" id="statActive">0</div>
        <div class="label">Active Users</div>
      </div>
      <div class="stat-card">
        <div class="icon"><i class="fa-solid fa-user-xmark"></i></div>
        <div class="value" id="statRejected">0</div>
        <div class="label">Rejected</div>
      </div>
      <div class="stat-card">
        <div class="icon"><i class="fa-solid fa-chart-line"></i></div>
        <div class="value" id="statTotal">0</div>
        <div class="label">Total</div>
      </div>
    </div>

    <section class="panel">
      <div class="panel-header">
        <h3>
          <i class="fa-solid fa-hourglass-half"></i> 
          Pending Requests 
          <span class="badge" id="badgePending">0</span>
        </h3>
      </div>
      <div id="pendingRequestsContainer"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h3><i class="fa-solid fa-users"></i> Active Users</h3>
      </div>
      <div class="user-table-wrap">
        <table class="user-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Job Title</th>
              <th>Department</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="activeUsersTable"></tbody>
        </table>
      </div>
    </section>

  </div>

<script>
const _role = localStorage.getItem("userRole");
if(!_role) window.location.href = "auth.html"; 
else if(_role !== "admin") window.location.href = "connect.html";

const API_BASE = "http://localhost:5000";

async function fetchAPI(endpoint, options = {}) {
  try {
    const response = await fetch(`${API_BASE}${endpoint}`, {
      headers: { 'Content-Type': 'application/json', ...options.headers },
      ...options
    });
    const data = await response.json();
    return { ok: response.ok, data, status: response.status };
  } catch (error) {
    console.error('API Error:', error);
    return { ok: false, error: error.message };
  }
}

let pendingRequests = [];
let allUsers = [];

async function loadPendingRequests() {
  const result = await fetchAPI('/api/access-requests/pending');
  if (result.ok) pendingRequests = result.data.requests || [];
  else { console.error('Failed to load pending requests'); pendingRequests = []; }
}

async function loadAllUsers() {
  const result = await fetchAPI('/api/users');
  if (result.ok) allUsers = result.data.users || [];
  else { console.error('Failed to load users'); allUsers = []; }
}

function showAlert(type, message){
  const alertBox = document.getElementById("alertBox");
  alertBox.className = `alert ${type} show`;
  alertBox.innerHTML = `<i class="fa-solid fa-${type === 'success' ? 'check-circle' : type === 'danger' ? 'exclamation-circle' : 'info-circle'}"></i> ${message}`;
  setTimeout(() => alertBox.classList.remove("show"), 4000);
}

function updateStats(){
  const pending = pendingRequests.length;
  const active = allUsers.filter(u => u.status === 'active').length;
  document.getElementById("statPending").textContent = pending;
  document.getElementById("statActive").textContent = active;
  document.getElementById("statRejected").textContent = 0;
  document.getElementById("statTotal").textContent = pending;
  document.getElementById("badgePending").textContent = pending;
}

function renderPendingRequests(){
  const container = document.getElementById("pendingRequestsContainer");
  if(pendingRequests.length === 0){
    container.innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-inbox"></i>
        <p>No pending requests at the moment.</p>
      </div>`;
    return;
  }
  container.innerHTML = pendingRequests.map(req => `
    <div class="request-card">
      <div class="request-header">
        <div class="request-info">
          <h4>${req.name}</h4>
          <div class="email"><i class="fa-solid fa-envelope"></i> ${req.email}</div>
          <div class="meta">
            <i class="fa-solid fa-briefcase"></i> ${req.job_title} 
            ${req.department ? `• ${req.department}` : ""}
            <br>
            <i class="fa-solid fa-clock"></i> Submitted: ${new Date(req.submitted_at).toLocaleString()}
          </div>
        </div>
      </div>
      <div class="request-reason"><strong>Reason:</strong><br>${req.reason}</div>
      <div class="request-actions">
        <button class="btn-small btn-approve" onclick="approveRequest(${req.id})">
          <i class="fa-solid fa-check"></i> Approve
        </button>
        <button class="btn-small btn-reject" onclick="rejectRequest(${req.id})">
          <i class="fa-solid fa-xmark"></i> Reject
        </button>
      </div>
    </div>
  `).join("");
}

function renderActiveUsers(){
  const tbody = document.getElementById("activeUsersTable");
  const activeUsers = allUsers.filter(u => u.status === 'active' && u.role !== 'admin');
  if(activeUsers.length === 0){
    tbody.innerHTML = `
      <tr>
        <td colspan="5" style="text-align:center; padding:40px; color:var(--text-muted);">
          <i class="fa-solid fa-users-slash" style="font-size:2rem; opacity:0.3; display:block; margin-bottom:10px;"></i>
          No active users yet.
        </td>
      </tr>`;
    return;
  }
  tbody.innerHTML = activeUsers.map(user => `
    <tr>
      <td><strong>${user.name}</strong></td>
      <td>${user.email}</td>
      <td>${user.job_title || '---'}</td>
      <td>${user.department || '---'}</td>
      <td><span style="color: var(--accent-glow);">Active</span></td>
    </tr>
  `).join("");
}

async function approveRequest(id){
  const result = await fetchAPI(`/api/access-requests/${id}/approve`, {
    method: 'POST',
    body: JSON.stringify({ admin_id: 1 })
  });
  if(result.ok){
    showAlert("success", `✓ Request approved!`);
    await refresh();
  } else {
    showAlert("danger", `Failed: ${result.data.error || 'Unknown error'}`);
  }
}

async function rejectRequest(id){
  const result = await fetchAPI(`/api/access-requests/${id}/reject`, {
    method: 'POST',
    body: JSON.stringify({ admin_id: 1 })
  });
  if(result.ok){
    showAlert("info", `Request rejected.`);
    await refresh();
  } else {
    showAlert("danger", `Failed: ${result.data.error || 'Unknown error'}`);
  }
}

async function refresh(){
  await loadPendingRequests();
  await loadAllUsers();
  updateStats();
  renderPendingRequests();
  renderActiveUsers();
}

function setupAdminHeader(){
  const btnAccount = document.getElementById("btnAccount");
  const menu = document.getElementById("accountMenu");
  const logoutBtn = document.getElementById("menuLogout");
  const menuAdmin = document.getElementById("menuAdmin");
  const backBtn = document.getElementById("btnBack");
  if (!btnAccount || !menu) return;
  if(menuAdmin) menuAdmin.classList.add("show");
  btnAccount.onclick = (e) => { e.stopPropagation(); menu.classList.toggle("open"); };
  document.onclick = () => { if(menu.classList.contains("open")) menu.classList.remove("open"); };
  menu.onclick = (e) => e.stopPropagation();
  if (logoutBtn) logoutBtn.onclick = () => { localStorage.removeItem("userRole"); window.location.href = "index.html"; };
  if(backBtn){ backBtn.style.display = "inline-flex"; backBtn.onclick = () => window.location.href = "chat.html"; }
}

window.addEventListener("DOMContentLoaded", async () => {
  try {
    const res = await fetch("header.html");
    const headerHtml = await res.text();
    const placeholder = document.getElementById("header-placeholder");
    if(placeholder) placeholder.innerHTML = headerHtml;
    setTimeout(async () => { setupAdminHeader(); await refresh(); }, 300);
  } catch (e) {
    console.error("❌ Error:", e);
    await refresh();
  }
});
</script>
</body>
</html>
