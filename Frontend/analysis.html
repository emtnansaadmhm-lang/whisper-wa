<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisper-WA | التحليل</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary-dark:#1f5f3b;
      --primary-mid:#3f9b5f;
      --primary-light:#5fbf7a;
      --accent-glow:#8fd9a8;

      --bg-dark:#0e1a12;

      --glass-bg: rgba(20, 40, 30, 0.65);
      --glass-border: rgba(95, 191, 122, 0.3);

      --text-white:#ffffff;
      --text-muted:#c2dec9;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }

    body{
      font-family:'Tajawal',sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-white);
      min-height:100vh;
      overflow-x:hidden;
      background-image:
        linear-gradient(rgba(31, 95, 59, 0.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 95, 59, 0.10) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .animated-bg-logo{
      position: fixed;
      top:50%;
      left:50%;
      transform: translate(-50%,-50%);
      z-index:-1;
      width: 650px;
      pointer-events:none;
      opacity:0.18;
      animation: cyberGlowPulse 8s ease-in-out infinite alternate;
    }

    .animated-bg-logo img{
      width:100%;
      height:auto;
      filter: drop-shadow(0 0 30px var(--primary-mid));
    }

    @keyframes cyberGlowPulse{
      0%{ opacity:0.12; transform: translate(-50%,-50%) scale(0.95); }
      100%{ opacity:0.32; transform: translate(-50%,-50%) scale(1.05); }
    }

    .main-container{
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px;
      display:flex;
      flex-direction:column;
      gap: 18px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .panel{
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px);
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      padding: 16px;
      overflow:hidden;
    }

    .panel-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .panel-title h4{
      font-size: 1rem;
      color: var(--primary-light);
      display:inline-flex;
      align-items:center;
      gap: 10px;
    }

    .muted{
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .stat-grid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    @media(max-width: 980px){
      .stat-grid{ grid-template-columns: repeat(2, 1fr);}
    }

    @media(max-width: 560px){
      .stat-grid{ grid-template-columns: 1fr;}
    }

    .stat{
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .stat .label{
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    .stat .value{
      font-size: 1.25rem;
      font-weight: 700;
    }

    .stat .sub{
      color: rgba(255,255,255,0.75);
      font-size: 0.82rem;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap: 10px;
      max-height: 280px;
      overflow:auto;
      padding-left: 2px;
    }

    .item{
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 12px;
      display:flex;
      flex-direction:column;
      gap: 6px;
    }

    .item .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--accent-glow);
      background: rgba(95,191,122,0.12);
      white-space: nowrap;
    }

    .danger{
      background: rgba(255, 77, 77, 0.12);
      color:#ffd0d0;
      border-color: rgba(255,77,77,0.25);
    }

    .warn{
      background: rgba(255, 193, 7, 0.12);
      color:#ffe7a6;
      border-color: rgba(255,193,7,0.25);
    }

    .ok{
      background: rgba(95,191,122,0.12);
      color:#d8ffe4;
      border-color: rgba(95,191,122,0.25);
    }

    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.88);
      overflow-wrap:anywhere;
    }

    .loading-box,
    .error-box{
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 8px;
    }

    .error-box{
      border-color: rgba(255,77,77,0.35);
      color: #ffd0d0;
    }

    .col-12{ grid-column: span 12; }
    .col-6{ grid-column: span 6; }

    @media(max-width: 980px){
      .col-6{ grid-column: span 12; }
    }
  </style>
</head>

<body>
  <div class="animated-bg-logo">
    <img src="logo.png" alt="Background Logo">
  </div>

  <div class="main-container">
    <div id="header-placeholder"></div>

    <div id="pageMessage"></div>

    <div class="grid">
      <section class="panel col-12">
        <div class="panel-title">
          <h4><i class="fa-solid fa-chart-simple"></i> <span id="txt-summary-title">ملخص عام</span></h4>
        </div>
        <div class="stat-grid" id="summaryStats"></div>
      </section>

      <section class="panel col-6">
        <div class="panel-title">
          <h4><i class="fa-solid fa-clock"></i> <span id="txt-activity-title">نمط النشاط</span></h4>
        </div>
        <div class="list" id="activityList"></div>
      </section>

      <section class="panel col-6">
        <div class="panel-title">
          <h4><i class="fa-solid fa-triangle-exclamation"></i> <span id="txt-flags-title">مؤشرات مبدئية</span></h4>
        </div>
        <div class="list" id="flagsList"></div>
      </section>

      <section class="panel col-6">
        <div class="panel-title">
          <h4><i class="fa-solid fa-link"></i> <span id="txt-urls-title">الروابط المستخرجة</span></h4>
          <span class="pill" id="urlsCountPill">0</span>
        </div>
        <div class="list" id="urlsList"></div>
      </section>

      <section class="panel col-6">
        <div class="panel-title">
          <h4><i class="fa-solid fa-hashtag"></i> <span id="txt-numbers-title">الأرقام المستخرجة</span></h4>
          <span class="pill" id="numbersCountPill">0</span>
        </div>
        <div class="list" id="numbersList"></div>
      </section>

      <section class="panel col-12">
        <div class="panel-title">
          <h4><i class="fa-solid fa-magnifying-glass"></i> <span id="txt-keywords-title">كلمات مهمة</span></h4>
          <span class="muted" id="txt-keywords-note">Hits</span>
        </div>
        <div class="list" id="keywordsList"></div>
      </section>
    </div>
  </div>

  <script>
    let currentLang = localStorage.getItem("lang") || "ar";

    const UI = {
      ar: {
        title: "Whisper-WA | التحليل",
        topSubtitle: "منصة التحليل الجنائي الرقمي",
        summaryTitle: "ملخص عام",
        activityTitle: "نمط النشاط",
        flagsTitle: "مؤشرات مبدئية",
        urlsTitle: "الروابط المستخرجة",
        numbersTitle: "الأرقام المستخرجة",
        keywordsTitle: "كلمات مهمة",
        keywordsNote: "Hits",
        s_total: "عدد الرسائل",
        s_first: "أول تواصل",
        s_last: "آخر تواصل",
        s_artifacts: "Artifacts",
        s_sent: "مرسل",
        s_recv: "مستلم",
        times: "مرة",
        links: "روابط",
        numbers: "أرقام",
        hits: "Hits",
        a_peak_hour: "أكثر ساعة نشاط",
        a_peak_day: "أكثر يوم نشاط",
        a_duration: "مدة التواصل",
        a_ratio: "مرسل / مستلم",
        p_important: "مهم",
        p_warn: "تنبيه",
        p_ok: "مقبول",
        no_urls: "لا توجد روابط.",
        no_numbers: "لا توجد أرقام.",
        no_keywords: "لا توجد كلمات مطابقة.",
        no_flags: "لا توجد مؤشرات حالياً.",
        no_activity: "لا توجد بيانات نشاط.",
        loading: "جاري تحميل التحليل...",
        failed: "تعذر تحميل التحليل.",
        not_found: "لم يتم العثور على تقرير التحليل. شغلي workflow أول."
      },
      en: {
        title: "Whisper-WA | Analysis",
        topSubtitle: "Digital Forensics Platform",
        summaryTitle: "Overview",
        activityTitle: "Activity Pattern",
        flagsTitle: "Initial Flags",
        urlsTitle: "Extracted URLs",
        numbersTitle: "Extracted Numbers",
        keywordsTitle: "Important Keywords",
        keywordsNote: "Hits",
        s_total: "Total Messages",
        s_first: "First Contact",
        s_last: "Last Contact",
        s_artifacts: "Artifacts",
        s_sent: "Sent",
        s_recv: "Received",
        times: "times",
        links: "URLs",
        numbers: "Numbers",
        hits: "Hits",
        a_peak_hour: "Most active hour",
        a_peak_day: "Most active day",
        a_duration: "Communication span",
        a_ratio: "Sent / Received",
        p_important: "Important",
        p_warn: "Warning",
        p_ok: "OK",
        no_urls: "No URLs found.",
        no_numbers: "No numbers found.",
        no_keywords: "No matching keywords.",
        no_flags: "No flags for now.",
        no_activity: "No activity data.",
        loading: "Loading analysis...",
        failed: "Failed to load analysis.",
        not_found: "Analysis report not found. Run workflow first."
      }
    };

    let raw = {
      summary: {},
      activity: [],
      flags: [],
      urls: [],
      numbers: [],
      keywords: []
    };

    function setPill(el, text){
      if(el) el.textContent = text;
    }

    function showMessage(type, text){
      const box = document.getElementById("pageMessage");
      if(!box) return;

      if(!text){
        box.innerHTML = "";
        return;
      }

      box.innerHTML = `<div class="${type === 'error' ? 'error-box' : 'loading-box'}">${text}</div>`;
    }

    function renderSummary(s){
      const t = UI[currentLang];
      const wrap = document.getElementById("summaryStats");
      wrap.innerHTML = "";

      const totalMessages = s.total_messages || 0;
      const sent = s.sent || 0;
      const received = s.received || 0;
      const firstContact = s.first_contact || "-";
      const lastContact = s.last_contact || "-";
      const urlsCount = s.urls_count || 0;
      const numbersCount = s.numbers_count || 0;
      const keywordHits = s.keyword_hits_total || 0;

      const firstDate = firstContact !== "-" && firstContact.includes(" ") ? firstContact.split(" ")[0] : firstContact;
      const lastDate = lastContact !== "-" && lastContact.includes(" ") ? lastContact.split(" ")[0] : lastContact;

      const cards = [
        {
          label: t.s_total,
          value: totalMessages,
          sub: `${t.s_sent}: ${sent} | ${t.s_recv}: ${received}`
        },
        {
          label: t.s_first,
          value: firstDate || "-",
          sub: firstContact
        },
        {
          label: t.s_last,
          value: lastDate || "-",
          sub: lastContact
        },
        {
          label: t.s_artifacts,
          value: `${urlsCount} ${t.links}`,
          sub: `${numbersCount} ${t.numbers} | ${keywordHits} ${t.hits}`
        }
      ];

      cards.forEach(c=>{
        const div = document.createElement("div");
        div.className = "stat";
        div.innerHTML = `
          <div class="label">${c.label}</div>
          <div class="value">${c.value}</div>
          <div class="sub">${c.sub}</div>
        `;
        wrap.appendChild(div);
      });
    }

    function renderActivity(list){
      const t = UI[currentLang];
      const wrap = document.getElementById("activityList");
      wrap.innerHTML = "";

      if(!list.length){
        wrap.innerHTML = `<div class="muted">${t.no_activity}</div>`;
        return;
      }

      const labelMap = {
        peak_hour: t.a_peak_hour,
        peak_day: t.a_peak_day,
        duration: t.a_duration,
        ratio: t.a_ratio
      };

      list.forEach(r=>{
        const div = document.createElement("div");
        div.className = "item";
        const val = (currentLang === "ar") ? r.value_ar : r.value_en;
        div.innerHTML = `
          <div class="row">
            <span class="mono">${labelMap[r.id] || r.id}</span>
            <span class="pill ok">${val || "-"}</span>
          </div>
        `;
        wrap.appendChild(div);
      });
    }

    function renderFlags(flags){
      const t = UI[currentLang];
      const wrap = document.getElementById("flagsList");
      wrap.innerHTML = "";

      if(!flags.length){
        wrap.innerHTML = `<div class="muted">${t.no_flags}</div>`;
        return;
      }

      flags.forEach(f=>{
        const div = document.createElement("div");
        div.className = "item";

        const pillClass = f.level === "danger" ? "danger" : (f.level === "warn" ? "warn" : "ok");
        const pillText = f.level === "danger" ? t.p_important : (f.level === "warn" ? t.p_warn : t.p_ok);

        const title = (currentLang === "ar") ? f.title_ar : f.title_en;
        const desc = (currentLang === "ar") ? f.desc_ar : f.desc_en;

        div.innerHTML = `
          <div class="row">
            <span class="mono"><b>${title}</b></span>
            <span class="pill ${pillClass}">${pillText}</span>
          </div>
          <div class="muted">${desc}</div>
        `;
        wrap.appendChild(div);
      });
    }

    function renderUrls(urls){
      const t = UI[currentLang];
      const wrap = document.getElementById("urlsList");
      wrap.innerHTML = "";

      setPill(document.getElementById("urlsCountPill"), `${urls.length} ${t.links}`);

      if(!urls.length){
        wrap.innerHTML = `<div class="muted">${t.no_urls}</div>`;
        return;
      }

      urls.forEach(u=>{
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <div class="row">
            <span class="mono">${u.url}</span>
            <span class="pill">${u.count} ${t.times}</span>
          </div>
        `;
        wrap.appendChild(div);
      });
    }

    function renderNumbers(nums){
      const t = UI[currentLang];
      const wrap = document.getElementById("numbersList");
      wrap.innerHTML = "";

      setPill(document.getElementById("numbersCountPill"), `${nums.length} ${t.numbers}`);

      if(!nums.length){
        wrap.innerHTML = `<div class="muted">${t.no_numbers}</div>`;
        return;
      }

      nums.forEach(n=>{
        const div = document.createElement("div");
        div.className = "item";
        const ctx = (currentLang==="ar") ? n.context_ar : n.context_en;
        div.innerHTML = `
          <div class="row">
            <span class="mono">${n.value}</span>
            <span class="pill">${n.count} ${t.times}</span>
          </div>
          <div class="muted">${ctx}</div>
        `;
        wrap.appendChild(div);
      });
    }

    function renderKeywords(keys){
      const t = UI[currentLang];
      const wrap = document.getElementById("keywordsList");
      wrap.innerHTML = "";

      if(!keys.length){
        wrap.innerHTML = `<div class="muted">${t.no_keywords}</div>`;
        return;
      }

      keys.forEach(k=>{
        const div = document.createElement("div");
        div.className = "item";
        const examples = (currentLang==="ar" ? (k.examples_ar||[]) : (k.examples_en||[]))
          .slice(0,3)
          .map(x => `• ${x}`)
          .join("<br>");

        div.innerHTML = `
          <div class="row">
            <span class="mono"><b>${k.keyword}</b></span>
            <span class="pill">${k.hits} ${t.hits}</span>
          </div>
          <div class="muted">${examples || "—"}</div>
        `;
        wrap.appendChild(div);
      });
    }

    function renderAll(){
      renderSummary(raw.summary || {});
      renderActivity(raw.activity || []);
      renderFlags(raw.flags || []);
      renderUrls(raw.urls || []);
      renderNumbers(raw.numbers || []);
      renderKeywords(raw.keywords || []);
    }

    function mapBackendToFrontend(data){
      const phoneNumbers = data.entities?.phone_numbers || [];
      const ibans = data.entities?.ibans || [];
      const urls = data.entities?.urls || [];
      const keywordsObj = data.keywords || {};
      const flagsArr = data.flags || [];

      return {
        summary: {
          total_messages: data.summary?.total_messages || 0,
          sent: data.summary?.sent_messages || 0,
          received: data.summary?.received_messages || 0,
          first_contact: data.summary?.first_message || "-",
          last_contact: data.summary?.last_message || "-",
          urls_count: urls.length,
          numbers_count: phoneNumbers.length + ibans.length,
          keyword_hits_total: Object.keys(keywordsObj).length
        },

        activity: [
          {
            id: "peak_hour",
            value_ar: data.temporal?.peak_hour || "-",
            value_en: data.temporal?.peak_hour || "-"
          },
          {
            id: "peak_day",
            value_ar: data.temporal?.peak_day || "-",
            value_en: data.temporal?.peak_day || "-"
          },
          {
            id: "duration",
            value_ar: `${data.temporal?.duration_days || 0} يوم`,
            value_en: `${data.temporal?.duration_days || 0} days`
          },
          {
            id: "ratio",
            value_ar: `${data.summary?.sent_messages || 0} / ${data.summary?.received_messages || 0}`,
            value_en: `${data.summary?.sent_messages || 0} / ${data.summary?.received_messages || 0}`
          }
        ],

        flags: flagsArr.map(f => ({
          level: f.severity === "high" ? "danger" : (f.severity === "medium" ? "warn" : "ok"),
          title_ar: f.description_ar || "مؤشر",
          title_en: f.description_en || "Flag",
          desc_ar: `العدد: ${f.count || 0}`,
          desc_en: `Count: ${f.count || 0}`
        })),

        urls: urls.map(u => ({
          url: u,
          count: 1
        })),

        numbers: [
          ...phoneNumbers.map(n => ({
            value: n,
            context_ar: "رقم جوال مستخرج من الرسائل",
            context_en: "Phone number extracted from messages",
            count: 1
          })),
          ...ibans.map(n => ({
            value: n,
            context_ar: "رقم IBAN مستخرج من الرسائل",
            context_en: "IBAN extracted from messages",
            count: 1
          }))
        ],

        keywords: Object.entries(keywordsObj).map(([keyword, info]) => ({
          keyword,
          hits: info.count || 0,
          examples_ar: (info.messages || []).map(m => m.text).slice(0, 3),
          examples_en: (info.messages || []).map(m => m.text).slice(0, 3)
        }))
      };
    }

    function applyLangToHeaderAndPage(){
      const t = UI[currentLang];
      const html = document.documentElement;

      html.lang = currentLang;
      html.dir = (currentLang === "ar") ? "rtl" : "ltr";
      document.title = t.title;

      const topSubtitle = document.getElementById("top-subtitle");
      const langText = document.getElementById("langText");

      if (topSubtitle) topSubtitle.textContent = t.topSubtitle;
      if (langText) langText.textContent = (currentLang === "en") ? "AR" : "EN";

      document.getElementById("txt-summary-title").textContent = t.summaryTitle;
      document.getElementById("txt-activity-title").textContent = t.activityTitle;
      document.getElementById("txt-flags-title").textContent = t.flagsTitle;
      document.getElementById("txt-urls-title").textContent = t.urlsTitle;
      document.getElementById("txt-numbers-title").textContent = t.numbersTitle;
      document.getElementById("txt-keywords-title").textContent = t.keywordsTitle;
      document.getElementById("txt-keywords-note").textContent = t.keywordsNote;

      renderAll();
    }

    async function loadAnalysis(){
      const t = UI[currentLang];
      showMessage("loading", t.loading);

      try {
        const caseId = localStorage.getItem("case_id") || "Case_001";
        const res = await fetch(`http://127.0.0.1:5000/api/analysis/${caseId}`);
        const data = await res.json();

        if (!res.ok || !data.ok) {
          showMessage("error", data.error || t.failed);
          return;
        }

        raw = mapBackendToFrontend(data);
        renderAll();
        showMessage("", "");
      } catch (error) {
        console.error("Failed to load analysis:", error);
        showMessage("error", t.not_found);
      }
    }

    if(!localStorage.getItem("userRole")){
      window.location.href = "auth.html";
    }

    function setupHeader(){
      const btnAccount = document.getElementById("btnAccount");
      const menu = document.getElementById("accountMenu");
      const logoutBtn = document.getElementById("menuLogout");
      const menuAdmin = document.getElementById("menuAdmin");
      const menuAdminBadge = document.getElementById("menuAdminBadge");
      const avatarBadge = document.getElementById("avatarBadge");

      if (!btnAccount || !menu) return;

      const userRole = localStorage.getItem("userRole");

      if(userRole === "admin" && menuAdmin){
        menuAdmin.classList.add("show");

        try{
          const requests = JSON.parse(localStorage.getItem("accountRequests") || "[]");
          const pendingCount = requests.filter(r => r.status === "pending").length;

          if(pendingCount > 0){
            if (menuAdminBadge) menuAdminBadge.textContent = pendingCount;
            if (avatarBadge){
              avatarBadge.textContent = pendingCount;
              avatarBadge.classList.add("show");
            }
          }
        } catch(e){}
      }

      btnAccount.onclick = (e) => {
        e.stopPropagation();
        menu.classList.toggle("open");
      };

      document.onclick = () => {
        if(menu.classList.contains("open")){
          menu.classList.remove("open");
        }
      };

      menu.onclick = (e) => e.stopPropagation();

      if (logoutBtn){
        logoutBtn.onclick = () => {
          localStorage.removeItem("userRole");
          window.location.href = "index.html";
        };
      }
    }

    function setupBackButton(returnPage){
      const backBtn = document.getElementById("btnBack");
      if(backBtn){
        backBtn.style.display = "inline-flex";
        backBtn.onclick = () => window.location.href = returnPage;
      }
    }

    function setupLanguage(){
      const btnLang = document.getElementById("btnLang");
      if (btnLang) {
        btnLang.onclick = () => {
          currentLang = (currentLang === "ar") ? "en" : "ar";
          localStorage.setItem("lang", currentLang);
          applyLangToHeaderAndPage();
        };
      }
      applyLangToHeaderAndPage();
    }

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const res = await fetch("header.html");
        const headerHtml = await res.text();
        const holder = document.getElementById("header-placeholder");
        if (holder) holder.innerHTML = headerHtml;

        setTimeout(() => {
          setupHeader();
          setupBackButton("chat.html");
          setupLanguage();
          loadAnalysis();
        }, 100);

      } catch (e) {
        console.error("Header load error:", e);
        applyLangToHeaderAndPage();
        loadAnalysis();
      }
    });
  </script>
</body>
</html>
